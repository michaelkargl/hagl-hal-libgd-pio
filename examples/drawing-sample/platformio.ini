[platformio]
default_envs = native

[env:native]
platform = native
lib_ldf_mode = off
lib_deps =
    hagl-lib
build_flags =
    -DDISPLAY_WIDTH=500
    -DDISPLAY_HEIGHT=250
    -DEXPORT_FILE_PATH='"/home/kami/workspace/hagl-space/pio-hagl-hal-libgd/examples/drawing-sample/hagl.bmp"'
